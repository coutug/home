# Hypridle configuration
# Screen off: 5 min
# Lock: 15 min
# Suspend on battery only: 20 min

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on

    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
    ignore_wayland_inhibit = false
}

# Turn displays off after 5 minutes.
# Session remains unlocked until the 15-minute listener below.
listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Lock session after 15 minutes.
listener {
    timeout = 900
    on-timeout = loginctl lock-session
}

# Suspend after 20 minutes only when a battery exists and AC power is not connected.
listener {
    timeout = 1200
    on-timeout = sh -c 'has_battery=0; for battery_status in /sys/class/power_supply/BAT*/status; do [ -r "$battery_status" ] && has_battery=1; done; [ "$has_battery" = 1 ] || exit 0; for ac_online in /sys/class/power_supply/AC*/online /sys/class/power_supply/ADP*/online /sys/class/power_supply/ACAD/online; do [ -r "$ac_online" ] && [ "$(cat "$ac_online")" = 1 ] && exit 0; done; systemctl suspend'
}
