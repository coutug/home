# Hyprlock configuration
# Theme: transparent cyber, matching Waybar

general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = /home/gabriel/sync/Images/wallpaper/3131275.jpg
    blur_passes = 3
    blur_size = 6
    noise = 0.0117
    contrast = 1.05
    brightness = 0.72
    vibrancy = 0.18
    vibrancy_darkness = 0.25
}

# Subtle dark cyber overlay.
shape {
    monitor =
    size = 620, 260
    color = rgba(06081488)
    rounding = 28
    border_size = 1
    border_color = rgba(00e5ff55)
    position = 0, 25
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(e8fbffff)
    font_size = 82
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A %d %B %Y"
    color = rgba(a8f7ffff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 340, 58
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(00e5ff99)
    inner_color = rgba(0f1422cc)
    font_color = rgba(e8fbffff)
    fade_on_empty = false
    placeholder_text = <span foreground="##6d7c91">Password</span>
    hide_input = false
    check_color = rgba(b854ff99)
    fail_color = rgba(ff4466cc)
    fail_text = <i>Authentication failed</i>
    capslock_color = rgba(ffd166cc)
    position = 0, -70
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:30000] sh -c 'for capacity in /sys/class/power_supply/BAT*/capacity; do [ -r "$capacity" ] && printf "BAT %s%%" "$(cat "$capacity")" && exit 0; done; printf "AC"'
    color = rgba(e5c7ffff)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -155
    halign = center
    valign = center
}
